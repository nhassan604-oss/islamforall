<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islamforall</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: radial-gradient(circle at top, #111, #000);
  color: white;
  overflow-x: hidden;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
}

nav h1 {
  color: gold;
  text-shadow: 0 0 10px gold;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  color: gold;
}

/* HERO */
.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, rgba(255,215,0,0.15), transparent);
  text-align: center;
  animation: fadeIn 2s ease;
}

.hero h2 {
  font-size: 42px;
}

.hero p {
  opacity: 0.8;
  margin-top: 10px;
}

.btn {
  margin-top: 20px;
  padding: 12px 28px;
  background: gold;
  color: black;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  box-shadow: 0 0 15px gold;
}

/* CARDS */
.section {
  padding: 70px 20px;
  text-align: center;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 25px;
  margin-top: 40px;
}

.card {
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  transition: 0.4s;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,215,0,0.2), transparent);
  top: -50%;
  left: -50%;
  opacity: 0;
  transition: 0.5s;
}

.card:hover::before {
  opacity: 1;
}

.card:hover {
  transform: translateY(-12px) scale(1.03);
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(30px);}
  to {opacity: 1; transform: translateY(0);}
}

/* FOOTER */
footer {
  padding: 25px;
  text-align: center;
  opacity: 0.6;
}
</style>

</head>

</nav>

</section>
