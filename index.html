<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islamforall Platform</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #0a0a0a, #000);
  color: white;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: #000;
}
nav h1 { color: gold; }

/* SECTION */
.section { padding: 50px 20px; text-align: center; }

.search input {
  padding: 10px;
  border-radius: 20px;
  border: none;
  width: 260px;
}

/* HADITH LIST */
.hadith-box {
  max-width: 700px;
  margin: auto;
  text-align: left;
}

.hadith {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}
</style>
</head>

<body>

<nav>
  <h1>☪ Islamforall</h1>
</nav>

<section class="section">
  <h2>📚 Hadith Database</h2>

  <div class="search">
    <input placeholder="Search hadith..." onkeyup="searchHadith(this.value)">
  </div>

  <div class="hadith-box" id="hadith-box"></div>
</section>

<script>

/* HADITH DATABASE */
let hadiths = [
"Actions are judged by intentions. (Bukhari, Muslim)",
"The best among you are those with the best character. (Bukhari)",
"Islam is built upon five pillars. (Bukhari, Muslim)",
"None of you truly believes until he loves for his brother what he loves for himself. (Bukhari, Muslim)",
"Make things easy and do not make them difficult. (Bukhari)",
"The strong person is not the one who can wrestle, but the one who controls anger. (Bukhari)",
"Whoever believes in Allah and the Last Day should speak good or remain silent. (Bukhari, Muslim)",
"Cleanliness is half of faith. (Muslim)",
"Allah is gentle and loves gentleness. (Bukhari, Muslim)",
"The most beloved deeds to Allah are those done regularly, even if small. (Bukhari)",
"Paradise lies under the feet of mothers. (Ahmad)",
"The best charity is that given in Ramadan. (Tirmidhi)",
"Seek knowledge from cradle to grave. (Attributed)",
"Smiling is charity. (Tirmidhi)",
"Do not waste water even if at a flowing river. (Ibn Majah)"
];

/* LOAD */
function loadHadith(list){
  let box = document.getElementById("hadith-box");
  box.innerHTML = list.map(h=>`<div class="hadith">${h}</div>`).join("");
}

loadHadith(hadiths);

/* SEARCH */
function searchHadith(val){
  val = val.toLowerCase();
  let filtered = hadiths.filter(h=>h.toLowerCase().includes(val));
  loadHadith(filtered);
}

</script>

</body>
</html>
