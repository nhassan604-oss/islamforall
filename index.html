<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islamforall</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #0a0a0a, #000000);
  color: white;
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: rgba(0,0,0,0.6);
}

nav h1 {
  color: gold;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* Hero */
.hero {
  text-align: center;
  padding: 100px 20px;
  background: radial-gradient(circle, rgba(255,215,0,0.2), transparent);
}

.hero h2 {
  font-size: 40px;
}

.hero p {
  color: #ccc;
}

.button {
  background: gold;
  color: black;
  padding: 10px 25px;
  border-radius: 20px;
  display: inline-block;
  margin-top: 20px;
}

/* Cards */
.section {
  padding: 60px 20px;
  text-align: center;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 15px;
  width: 260px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card h3 {
  color: gold;
}

.card p {
  color: white;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
  <h1>☪ Islamforall</h1>
  <div>
    <a href="#">Home</a>
    <a href="#">Hadith</a>
    <a href="#">Tafsir</a>
    <a href="#">Prayer</a>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <h2>Authentic Knowledge of Islam</h2>
  <p>Qur'an • Hadith • Sunnah — Based on Authentic Sources</p>
  <div class="button">Explore</div>
</section>

<!-- Explore -->
<section class="section">
  <h2>Explore Knowledge</h2>

  <div class="cards">

    <div class="card">
      <h3>Hadith</h3>
      <p>Authentic sayings of Prophet ﷺ</p>
    </div>

    <div class="card">
      <h3>Tafsir</h3>
      <p>Explanation of the Qur'an</p>
    </div>

    <div class="card">
      <h3>Prayer</h3>
      <p>Step-by-step guide to Salah</p>
    </div>

  </div>
</section>

</body>
</html>
<!-- force rebuild -->
